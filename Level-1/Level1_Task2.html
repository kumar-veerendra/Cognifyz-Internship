<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Level 1 – Task 2 | JavaScript</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="Level1_Task2.css">
  
</head>
<body>

  <header>
    <h1>JavaScript Tasks</h1>
    <p>Level 1 · Task 2 — Cognifyz Web Dev Internship</p>
  </header>

  <!-- Task A: Color-Changing Button -->
  <div class="card">
    <h2><span>01</span>Color-Changing Button</h2>
    <button id="color-btn">Click me to change color!</button>
  </div>

  <!-- Task B: Time-based Greeting -->
  <div class="card">
    <h2><span>02</span>Time-Based Greeting</h2>
    <button id="greeting-btn">Show Greeting</button>
    <div id="greeting-output">Your greeting will appear here…</div>
  </div>

  <!-- Task C: Basic Calculator -->
  <div class="card">
    <h2><span>03</span>Basic Calculator (Addition)</h2>
    <div class="calc-row">
      <input type="number" id="num1" placeholder="0" />
      <span class="plus">+</span>
      <input type="number" id="num2" placeholder="0" />
    </div>
    <button id="calc-btn">Calculate</button>
    <div id="calc-result"></div>
  </div>

  <script src="Level1_Task2.js"></script>

</body>
</html>
